{% extends 'base.html' %}

{% block title %}View Task{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto space-y-4">
    <!-- Task Header & Meta -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-5">
        <div>
            <div class="flex items-center gap-3 mb-2">
                <span id="task-type-badge" class="px-3 py-1 bg-[var(--secondary)]/60 text-[var(--secondary)] text-[9px] font-black uppercase tracking-widest rounded-lg border border-[var(--secondary)]/20">
                    System Loading...
                </span>
                <span class="text-[var(--primary)] font-mono text-[10px]" id="task-id-display">#ID-XXXXXX</span>
            </div>
            <h1 id="task-title" class="text-[var(--primary)] text-xl font-black tracking-tight leading-none">Initializing Task...</h1>
        </div>

        <!-- Timer Terminal -->
        <div class="bg-[var(--primary)] text-white p-3 rounded-lg flex items-center gap-4 min-w-[180px] shadow-xl shadow-[var(--primary)]/20">
            <div class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center text-[var(--accent)]">
                <i class="fa-solid fa-stopwatch"></i>
            </div>
            <div>
                <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Elapsed Time</p>
                <p id="task-timer" class="font-mono text-xl font-bold tracking-tighter">00:00:00</p>
            </div>
        </div>
    </div>

    <!-- Main Workspace Area -->
    <div class="bg-white border border-slate-200 rounded-lg shadow-sm overflow-hidden min-h-[400px] flex flex-col">
        <!-- Task Content Stage -->
        <div id="task-stage" class="p-10 lg:p-16 flex-grow">
            <div class="flex flex-col items-center justify-center h-full text-center animate-pulse">
                <div class="w-12 h-12 border-4 border-[var(--secondary)] border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-slate-400 font-black uppercase text-[10px] tracking-[0.2em]">Synchronizing Task Data...</p>
            </div>
        </div>

        <!-- Sticky Footer Action -->
        <div class="bg-slate-50 border-t border-slate-100 p-8 flex flex-col md:flex-row items-center justify-between gap-6">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                <i class="fa-solid fa-triangle-exclamation text-[var(--accent)] mr-2"></i> 
                Do not refresh. Task progress is tracked in real-time.
            </p>
            
            <button id="complete-task-btn" class="w-full md:w-auto px-12 py-4 bg-[var(--primary)] text-white rounded-lg font-semibold uppercase text-[11px] hover:bg-[var(--accent)] hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-[var(--primary)]/10">
                Complete Task & Claim Reward
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/view_task.js') }}"></script>
{% endblock %}
