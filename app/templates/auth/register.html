<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Taskentra</title>
    
    <!-- Tailwind & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root {
            --primary: #0F172A;
            --accent: #F97316;
            --background: #F8FAFC;
            --secondary: #3ba4da;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--primary); }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Custom checkbox color */
        input[type="checkbox"]:checked { background-color: var(--secondary); border-color: var(--secondary); }
    </style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen px-6 py-12">

    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <a href="/">
                <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Taskentra Logo" class="h-12 mx-auto mb-4">
            </a>
            <h1 class="text-2xl font-bold text-white tracking-tight">Join Taskentra</h1>
            <p class="text-slate-400 text-sm">Start turning your focus into earnings</p>
        </div>

        <!-- Registration Card -->
        <div class="glass-card p-8 rounded-3xl shadow-2xl">
            <form id="registerForm" class="space-y-5">
                
                <!-- Full Name -->
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Full Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-user"></i>
                        </span>
                        <input type="text" name="name" id="name" required
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-[var(--secondary)] transition-all"
                            placeholder="Eric Gichuri">
                    </div>
                </div>

                <!-- Email Address -->
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                        <input type="email" name="email" id="email" required
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-[var(--secondary)] transition-all"
                            placeholder="eric@example.com">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" name="password" id="password" required
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-[var(--secondary)] transition-all"
                            placeholder="Minimum 8 characters">
                    </div>
                </div>

                <!-- Terms & Conditions -->
                <div class="flex items-start gap-3 py-2">
                    <input type="checkbox" id="terms" required class="mt-1 h-4 w-4 rounded border-slate-700 bg-slate-900/50 text-[var(--secondary)] focus:ring-0">
                    <label for="terms" class="text-xs text-slate-400 leading-normal">
                        I agree to the <a href="#" class="text-[var(--secondary)] hover:underline">Terms of Service</a> and acknowledge the <a href="#" class="text-[var(--secondary)] hover:underline">Privacy Policy</a>.
                    </label>
                </div>

                <!-- Error/Success Message -->
                <div id="responseMessage" class="hidden text-sm font-medium p-3 rounded-lg border"></div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn"
                    class="w-full bg-[var(--secondary)] text-white font-bold py-4 rounded-xl hover:shadow-[0_0_20px_rgba(59,164,218,0.4)] transition-all flex items-center justify-center">
                    <span id="btnText">Create My Account</span>
                    <i id="btnLoader" class="fa-solid fa-circle-notch fa-spin hidden ml-2"></i>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-800 text-center text-sm">
                <p class="text-slate-400">
                    Already a member? 
                    <a href="{{ url_for('auth.login' ) }}" class="text-white font-bold hover:text-[var(--accent)] transition-colors ml-1">Log In Here</a>
                </p>
            </div>
        </div>

        <p class="mt-8 text-center text-[10px] text-slate-600 uppercase tracking-[0.2em]">
            Protected by Taskentra Secure Engine
        </p>
    </div>

    <script>
        $(document).ready(function() {
            $('#registerForm').on('submit', function(e) {
                e.preventDefault();
                
                // UI Reset
                $('#responseMessage').addClass('hidden').removeClass('bg-red-400/10 text-red-400 border-red-400/20 bg-green-400/10 text-green-400 border-green-400/20');
                $('#btnText').text('Creating Account...');
                $('#btnLoader').removeClass('hidden');
                $('#submitBtn').prop('disabled', true).addClass('opacity-70 cursor-not-allowed');

                // AJAX Registration
                $.ajax({
                    url: '/api/auth/register',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        name: $('#name').val(),
                        email: $('#email').val(),
                        password: $('#password').val()
                    }),
                    success: function(response) {
                        $('#btnText').text('Success!');
                        $('#btnLoader').addClass('hidden');
                        $('#responseMessage').html('<i class="fa-solid fa-circle-check mr-2"></i> Account created! Redirecting...')
                            .addClass('bg-green-400/10 text-green-400 border-green-400/20').removeClass('hidden');
                        
                        setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
                    },
                    error: function(xhr) {
                        $('#btnText').text('Create My Account');
                        $('#btnLoader').addClass('hidden');
                        $('#submitBtn').prop('disabled', false).removeClass('opacity-70 cursor-not-allowed');
                        
                        const msg = xhr.responseJSON ? xhr.responseJSON.message : 'Registration failed';
                        $('#responseMessage').html(`<i class="fa-solid fa-triangle-exclamation mr-2"></i> ${msg}`)
                            .addClass('bg-red-400/10 text-red-400 border-red-400/20').removeClass('hidden');
                    }
                });
            });
        });
    </script>
</body>
</html>
