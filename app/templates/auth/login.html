<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Taskentra</title>
    
    <!-- Tailwind & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root {
            --primary: #0F172A;
            --accent: #F97316;
            --background: #F8FAFC;
            --secondary: #3ba4da;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--primary); }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen px-6">

    <div class="w-full max-w-md">
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <a href="/">
                <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Taskentra Logo" class="h-12 mx-auto mb-4">
            </a>
            <h1 class="text-2xl font-bold text-white tracking-tight">Welcome back</h1>
            <p class="text-slate-400 text-sm">Continue your growth journey</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card p-8 rounded-3xl shadow-2xl">
            <form id="loginForm" class="space-y-6">
                <!-- Email Input -->
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                        <input type="email" name="email" id="email" required
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-[var(--secondary)] transition-all"
                            placeholder="name@example.com">
                    </div>
                </div>

                <!-- Password Input -->
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-400">Password</label>
                        <a href="/forgot-password" class="text-xs font-bold text-[var(--secondary)] hover:underline">Forgot?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" name="password" id="password" required
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-[var(--secondary)] transition-all"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Error Message Container -->
                <div id="errorMessage" class="hidden text-red-400 text-sm font-medium bg-red-400/10 p-3 rounded-lg border border-red-400/20">
                    <i class="fa-solid fa-triangle-exclamation mr-2"></i> Invalid credentials. Please try again.
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn"
                    class="w-full bg-[var(--secondary)] text-white font-bold py-4 rounded-xl hover:shadow-[0_0_20px_rgba(59,164,218,0.4)] transition-all flex items-center justify-center">
                    <span id="btnText">Sign In</span>
                    <i id="btnLoader" class="fa-solid fa-circle-notch fa-spin hidden ml-2"></i>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-800 text-center text-sm">
                <p class="text-slate-400">
                    Don't have an account? 
                    <a href="{{ url_for('auth.register' ) }}" class="text-white font-bold hover:text-[var(--accent)] transition-colors ml-1">Create Account</a>
                </p>
            </div>
        </div>

        <!-- Back Link -->
        <div class="mt-6 text-center">
            <a href="{{ url_for('main.home' ) }}" class="text-slate-500 hover:text-white text-sm transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i> Back to Home
            </a>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            $('#loginForm').on('submit', function(e) {
                e.preventDefault();
                
                // UI Feedback
                $('#errorMessage').addClass('hidden');
                $('#btnText').text('Authenticating...');
                $('#btnLoader').removeClass('hidden');
                $('#submitBtn').prop('disabled', true).addClass('opacity-70 cursor-not-allowed');

                // AJAX Login
                $.ajax({
                    url: '/api/auth/login',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        email: $('#email').val(),
                        password: $('#password').val()
                    }),
                    success: function(response) {
                        // Redirect to dashboard on success
                        window.location.href = '/dashboard';
                    },
                    error: function(xhr) {
                        // Reset UI
                        $('#btnText').text('Sign In');
                        $('#btnLoader').addClass('hidden');
                        $('#submitBtn').prop('disabled', false).removeClass('opacity-70 cursor-not-allowed');
                        
                        // Show Error
                        const msg = xhr.responseJSON ? xhr.responseJSON.message : 'Login failed';
                        $('#errorMessage').html(`<i class="fa-solid fa-triangle-exclamation mr-2"></i> ${msg}`).removeClass('hidden');
                    }
                });
            });
        });
    </script>
</body>
</html>
